<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod Skin Lien Quan</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">&#9889;</span>
                <h1>KIANA MOD</h1>
            </div>
            <p class="tagline">Mod skin Lien Quan Mobile mien phi</p>
        </header>

        <main class="main">
            <!-- Step 1: Get Key -->
            <section id="auth-section" class="card">
                <div class="card-header">
                    <span class="step-badge">1</span>
                    <h2>Lấy Key</h2>
                </div>
                <p class="card-desc">Nhấn 1 để lấy key miễn phí</p>

                <button id="btn-get-key" class="btn btn-primary btn-full">
                    <span class="btn-text">Nhấn 1 để lấy key (Free)</span>
                    <span class="btn-loading hidden">Đang xử lý...</span>
                </button>

                <div id="key-info" class="key-info hidden">
                    <div class="key-link-box">
                        <p>ấn vào link để lấy key:</p>
                        <a id="key-link" href="#" target="_blank" rel="noopener"></a>
                        <p class="hint">Sau khi copy key, paste vào ô bên dưới</p>
                    </div>
                </div>

                <div class="input-row">
                    <input type="text" id="input-key" placeholder="Key: " autocomplete="off">
                    <button id="btn-verify" class="btn btn-secondary">Xác Nhận</button>
                </div>

                <div id="auth-msg" class="msg hidden"></div>
            </section>

            <!-- Step 2: Mod -->
            <section id="mod-section" class="card hidden">
                <div class="card-header">
                    <span class="step-badge">2</span>
                    <h2>Nhap thong tin</h2>
                </div>

                <div class="form-group">
                    <label>Tim skin theo ten</label>
                    <input type="text" id="skin-search" placeholder="Nhap ten hero hoac skin (VD: nak, killua...)" autocomplete="off">
                    <div id="search-results" class="search-results"></div>
                </div>

                <div class="form-group">
                    <label>Da chon</label>
                    <div id="selected-tags" class="tag-list"></div>
                </div>

                <textarea id="skin-ids" class="hidden" rows="1"></textarea>

                <div class="form-group">
                    <label for="cam-xa">Cam xa (%) - tùy chọn</label>
                    <input type="number" id="cam-xa" min="0" max="300" placeholder="VD: 25">
                </div>

                <div class="form-check">
                    <input type="checkbox" id="hd-mode">
                    <label for="hd-mode">Mod HD</label>
                </div>

                <button id="btn-mod" class="btn btn-primary btn-full">
                    <span class="btn-text">Bắt Đầu Mod</span>
                    <span class="btn-loading hidden">Đang xử lý...</span>
                </button>
            </section>

            <!-- Progress -->
            <section id="progress-section" class="card hidden">
                <div class="card-header">
                    <span class="step-badge spin">&#8635;</span>
                    <h2>Đang xử lý</h2>
                </div>
                <div class="progress-wrap">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="progress-pct" id="progress-pct">0%</span>
                </div>
                <p class="progress-text" id="progress-text">Vui lòng chờ...</p>
            </section>

            <!-- Download -->
            <section id="download-section" class="card hidden">
                <div class="card-header">
                    <span class="step-badge done">&#10003;</span>
                    <h2>Hoàn thành</h2>
                </div>
                <p class="card-desc">File của bạn đã sẵn sàng</p>
                <button id="btn-download" class="btn btn-success btn-full">Tải File ZIP</button>
                <button id="btn-new" class="btn btn-outline btn-full">Mod Thêm</button>
            </section>

            <div id="error-toast" class="toast hidden"></div>
        </main>

        <footer class="footer">
            <p>Kiana Mod AOV &copy; 2026</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
